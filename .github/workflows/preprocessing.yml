name: Automated Data Preprocessing

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "telco_churn_raw/**"
      - "preprocessing/automate_*.py"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  preprocess_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Preprocessing Automation
        run: |
          python preprocessing/automate_Fahrur.py --input telco_churn_raw/telco_churn_raw.csv --output preprocessing/telco_churn_preprocessing/telco_churn_clean.csv

      - name: Commit and Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add preprocessing/telco_churn_preprocessing/telco_churn_clean.csv

          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update processed dataset"

          konflik (fetch first)
          git pull --rebase origin main

          git push
